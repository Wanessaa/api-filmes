---
- name: Configurar monitoramento com Netdata
  hosts: vm2
  become: yes

  tasks:
    - name: Instalar dependências do Netdata
      apt:
        name:
          - curl
          - wget
          - git
          - zlib1g-dev
          - uuid-dev
          - libmnl-dev
          - pkg-config
          - make
          - gcc
          - autoconf
          - autoconf-archive
          - autogen
          - automake
          - libtool
          - python3
        state: present
        update_cache: yes

    - name: Instalar stress-ng para testes de CPU
      apt:
        name: stress-ng
        state: present

    - name: Baixar script do Netdata
      get_url:
        url: https://my-netdata.io/kickstart.sh
        dest: /tmp/kickstart.sh
        mode: '0755'

    - name: Instalar Netdata via script oficial
      shell: bash /tmp/kickstart.sh --dont-wait --disable-telemetry
      args:
        creates: /usr/sbin/netdata

    - name: Criar diretório de configuração de alertas
      file:
        path: /etc/netdata/health.d
        state: directory
        mode: '0755'

    - name: Configurar alerta de CPU 80%
      copy:
        dest: /etc/netdata/health.d/cpu_alert.conf
        content: |
          alarm: cpu_usage_high
          on: system.cpu
          lookup: average -1m percentage except idle
          units: %
          every: 10s
          warn: $this > 80
          crit: $this > 95
          info: CPU usage is high
          to: sysadmin

    - name: Configurar envio de e-mail no Netdata
      copy:
        dest: /etc/netdata/health_alarm_notify.conf
        content: |
          SEND_EMAIL="YES"
          DEFAULT_RECIPIENT_EMAIL="wnessasantana@gmail.com"
          EMAIL_SENDER="netdata@localhost"
          SEND_SLACK="NO"
          SEND_TWILIO="NO"
          SEND_TELEGRAM="NO"
          SEND_PUSHOVER="NO"
          SEND_PUSHBULLET="NO"

    - name: Instalar mailutils para envio de e-mail
      apt:
        name: mailutils
        state: present

    - name: Reiniciar Netdata para aplicar configurações
      service:
        name: netdata
        state: restarted
        enabled: yes