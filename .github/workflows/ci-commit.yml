name: CI - Commits

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'docs/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositório
        uses: actions/checkout@v3

      - name: Instalar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Instalar dependências
        run: npm install

      - name: Verificar estilo de codificação
        run: npx eslint .

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositório
        uses: actions/checkout@v3

      - name: Instalar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Instalar dependências
        run: npm install

      - name: Executar testes com cobertura
        run: npx jest --coverage

  build-image:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositório
        uses: actions/checkout@v3

      - name: Construir imagem Docker
        run: docker build -t wanessasantana/api-filmes:latest .

  publish-image:
    runs-on: ubuntu-latest
    needs: [lint, test, build-image]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Clonar repositório
        uses: actions/checkout@v3

      - name: Login no DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir e publicar imagem
        run: |
          docker build -t wanessasantana/api-filmes:latest .
          docker push wanessasantana/api-filmes:latest